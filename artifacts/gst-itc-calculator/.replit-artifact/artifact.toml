kind = "web"
previewPath = "/"
title = "Rule 43 GST ITC Calculator"
version = "1.0.0"
id = "artifacts/gst-itc-calculator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18570

[services.development]
run = "pnpm --filter @workspace/gst-itc-calculator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gst-itc-calculator", "run", "build" ]
publicDir = "artifacts/gst-itc-calculator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18570"
BASE_PATH = "/"
